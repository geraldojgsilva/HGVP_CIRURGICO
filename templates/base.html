
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "ChatBot IRSSL" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
  <div class="container">
    <h1>ChatBot IRSSL</h1>
    <nav>
      <a href="/">Início</a>
      <a href="/envio">Envio</a>
      <a href="/respostas">Respostas</a>
    </nav>
  </div>
</header>
<main class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash">
        {% for m in messages %}<div>{{ m }}</div>{% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<footer class="footer">
  <div class="container">IRSSL • ChatBot • {{ now or "" }}</div>
</footer>
</body>
</html>
